name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/pipeline.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/pipeline.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && contains(join(github.event.pull_request.changed_files, ','), 'backend/'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate
        name: Generate Prisma client

      - run: npx tsc --noEmit
        name: Type check

      - run: npm run lint
        continue-on-error: true

      - run: npm run build
        name: Build

  frontend:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && contains(join(github.event.pull_request.changed_files, ','), 'frontend/'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit
        name: Type check

      - run: npm run lint
        continue-on-error: true

      - run: npm run build
        name: Build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
